<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Pro VW</title>
    <style>
        :root {
            --vw-blue: #001e50;
            --vw-light-blue: #00b0f0;
            --light-gray: #f4f4f4;
        }
        body {
            font-family: "Arial", sans-serif;
            background-color: var(--light-gray);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: white;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { color: var(--vw-blue); text-align: center; border-bottom: 2px solid var(--vw-blue); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-calc { background-color: var(--vw-blue); color: white; }
        .btn-save { background-color: var(--vw-light-blue); color: white; }
        .btn-whatsapp { background-color: #25D366; color: white; margin-top: 20px; display: none; }
        
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            font-size: 14px;
        }
        table th { background: var(--vw-blue); color: white; padding: 10px; }
        table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        
        #listaClientes { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .cliente-card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cotizador VW Veracruz</h2>
    
    <div class="form-group">
        <label>Nombre del Cliente</label>
        <input type="text" id="nombre" placeholder="Nombre completo">
    </div>
    <div class="form-group">
        <label>Celular (10 dígitos)</label>
        <input type="tel" id="celular" placeholder="2291234567">
    </div>
    <div class="form-group">
        <label>Vehículo de Interés</label>
        <input type="text" id="vehiculo" placeholder="Ej. Taos Highline">
    </div>
    <div class="form-group">
        <label>Precio Total ($)</label>
        <input type="number" id="precio" placeholder="0.00">
    </div>
    <div class="form-group">
        <label>Enganche ($)</label>
        <input type="number" id="enganche" placeholder="0.00">
    </div>

    <button class="btn-calc" onclick="calcular()">Calcular Mensualidades</button>
    <button class="btn-save" onclick="guardarCliente()">Guardar en Historial</button>

    <table id="tablaPagos" style="display:none;">
        <thead>
            <tr>
                <th>Plazo</th>
                <th>Mensualidad</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>

    <button id="btnWhatsapp" class="btn-whatsapp" onclick="enviarWhatsapp()">Enviar Cotización por WhatsApp</button>

    <div id="listaClientes">
        <h3>Clientes Guardados</h3>
        <div id="contenedorClientes"></div>
    </div>
</div>

<script>
    const TASA_ANUAL = 0.169; // 16.9% de interés ajustable

    function calcular() {
        const precio = parseFloat(document.getElementById('precio').value);
        const enganche = parseFloat(document.getElementById('enganche').value);
        const cuerpoTabla = document.getElementById('cuerpoTabla');
        const tabla = document.getElementById('tablaPagos');
        const btnWs = document.getElementById('btnWhatsapp');

        if (isNaN(precio) || isNaN(enganche) || precio <= enganche) {
            alert("Verifica los montos ingresados.");
            return;
        }

        const montoFinanciar = precio - enganche;
        const plazos = [12, 24, 36, 48, 60];
        cuerpoTabla.innerHTML = "";

        plazos.forEach(meses => {
            const tasaMensual = TASA_ANUAL / 12;
            const mensualidad = (montoFinanciar * tasaMensual) / (1 - Math.pow(1 + tasaMensual, -meses));
            
            const fila = `<tr>
                <td>${meses} meses</td>
                <td>$${mensualidad.toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
            </tr>`;
            cuerpoTabla.innerHTML += fila;
        });

        tabla.style.display = "table";
        btnWs.style.display = "block";
    }

    function enviarWhatsapp() {
        const nombre = document.getElementById('nombre').value;
        const celular = document.getElementById('celular').value;
        const vehiculo = document.getElementById('vehiculo').value;
        const precioTotal = parseFloat(document.getElementById('precio').value).toLocaleString('es-MX');
        
        if (!celular || !nombre) { 
            alert("Ingresa nombre y celular para enviar el mensaje."); 
            return; 
        }

        // Extraer datos de la tabla generada
        const filas = document.querySelectorAll('#cuerpoTabla tr');
        let tablaTexto = "";
        
        filas.forEach(fila => {
            const columnas = fila.querySelectorAll('td');
            tablaTexto += `• ${columnas[0].innerText}: ${columnas[1].innerText}%0A`;
        });

        // Formatear mensaje según tu solicitud
        const mensaje = `*${nombre}* sus mensualidades por *${vehiculo}* con un precio total de *$${precioTotal}* son de:%0A%0A${tablaTexto}%0A¿Qué plazo se adapta mejor a lo que buscas?`;
        
        window.open(`https://wa.me/52${celular}?text=${mensaje}`, '_blank');
    }

    function guardarCliente() {
        const cliente = {
            nombre: document.getElementById('nombre').value,
            celular: document.getElementById('celular').value,
            vehiculo: document.getElementById('vehiculo').value,
            fecha: new Date().toLocaleDateString()
        };

        if(!cliente.nombre) return;

        let clientes = JSON.parse(localStorage.getItem('clientesVw') || "[]");
        clientes.unshift(cliente); // Agregar al inicio
        localStorage.setItem('clientesVw', JSON.stringify(clientes));
        mostrarClientes();
    }

    function mostrarClientes() {
        const contenedor = document.getElementById('contenedorClientes');
        let clientes = JSON.parse(localStorage.getItem('clientesVw') || "[]");
        contenedor.innerHTML = "";

        clientes.forEach(c => {
            contenedor.innerHTML += `
                <div class="cliente-card">
                    <strong>${c.nombre}</strong> - ${c.vehiculo}<br>
                    <small>Tel: ${c.celular} | ${c.fecha}</small>
                </div>
            `;
        });
    }

    // Asegurar carga limpia en Safari
    document.addEventListener('DOMContentLoaded', mostrarClientes);
</script>

</body>
</html>
